name: "snake"
description: "Generates a snake game from a github user contributions grid. Output the animation as svg. Adds extra custom color palettes on top of Platane/snk."
author: "RS-SaJiD"

inputs:
  github_user_name:
    description: "github user name"
    required: true
  github_token:
    description: "github token used to fetch the contribution calendar. Default to the action token if empty."
    required: false
    default: ${{ github.token }}
  outputs:
    required: false
    description: |
      list of files to generate.
      one file per line. Each output can be customized with options as query string.

       supported query string options:

      - palette:      A preset of color. Supports every Platane/snk built-in
                       palette (github, github-dark, github-light, gitlab, ...)
                       plus every palette defined in this repo's palettes.ts
      - color_snake:  Color of the snake
      - color_dots:   Coma separated list of dots color.

      example:
        outputs: |
          dark.svg?palette=red-github-dark
          light.svg?palette=synthwave

runs:
  using: "composite"
  steps:
    - name: setup bun
      uses: oven-sh/setup-bun@v2

    - name: resolve custom palettes in outputs
      id: resolve
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        SNAKE_RAW_OUTPUTS: ${{ inputs.outputs }}
      run: |
        {
          echo 'outputs<<SNAKE_EOF'
          bun run .github/scripts/resolve-outputs.ts
          echo 'SNAKE_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: generate svg
      uses: Platane/snk/svg-only@v3
      with:
        github_user_name: ${{ inputs.github_user_name }}
        github_token: ${{ inputs.github_token }}
        outputs: ${{ steps.resolve.outputs.outputs }}
