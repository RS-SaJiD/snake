name: generate all palette svgs (light + dark)

on:
  workflow_dispatch:

#  push:
#    branches:
#      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: generate snake animations (all palettes)
        uses: RS-SaJiD/snake@main
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # AUTO-GENERATED:START (do not edit by hand, run "update preview outputs" workflow instead)
            dist/red-github-dark.svg?palette=red-github-dark
            dist/red-github-light.svg?palette=red-github-light
            dist/halloween-dark.svg?palette=halloween-dark
            dist/halloween-light.svg?palette=halloween-light
            dist/winter-dark.svg?palette=winter-dark
            dist/winter-light.svg?palette=winter-light
            dist/one-dark-pro.svg?palette=one-dark-pro
            dist/synthwave.svg?palette=synthwave
            dist/dracula.svg?palette=dracula
            dist/monokai.svg?palette=monokai
            dist/nord.svg?palette=nord
            dist/tokyo-night.svg?palette=tokyo-night
            dist/catppuccin.svg?palette=catppuccin
            dist/gruvbox.svg?palette=gruvbox
            dist/rose-pine.svg?palette=rose-pine
            dist/solarized-dark.svg?palette=solarized-dark
            dist/cyberpunk.svg?palette=cyberpunk
            dist/sakura.svg?palette=sakura
            dist/black-and-white-dark.svg?palette=black-and-white-dark
            dist/black-and-white-light.svg?palette=black-and-white-light
            dist/neon-glowing-purple.svg?palette=neon-glowing-purple
            dist/github-dark.svg?palette=github-dark
            dist/github-light.svg?palette=github-light
            dist/gitlab-dark.svg?palette=gitlab-dark
            dist/gitlab-light.svg?palette=gitlab-light
            dist/forgejo-dark.svg?palette=forgejo-dark
            dist/forgejo-light.svg?palette=forgejo-light
            dist/codeberg-dark.svg?palette=codeberg-dark
            dist/codeberg-light.svg?palette=codeberg-light
            # AUTO-GENERATED:END
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: snake-assets
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
