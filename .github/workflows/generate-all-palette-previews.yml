name: generate all previews

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: build outputs list from palettes.ts
        id: build-list
        run: node scripts/build-outputs-list.js

      - name: generate snake animations (all palettes)
        uses: ./
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: ${{ steps.build-list.outputs.list }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: build PREVIEWS.md gallery
        run: node scripts/build-previews-md.js

      - name: push svgs + PREVIEWS.md to snake-assets branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: snake-assets
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
