name: Release 🚀

on:
  workflow_dispatch:
    inputs:
      version:
        description: "release version (e.g. v3.5.0 or v3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: delete old "latest" release + tag (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true

      - name: create "latest" tag + release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f latest
          git push origin latest --force
          gh release create latest \
            --title "latest" \
            --notes "Automatically points to the most recent release (${{ inputs.version }})." \
            --target "${{ github.sha }}"

      - name: delete existing release for this version (if re-running same version)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ inputs.version }}" --yes --cleanup-tag || true

      - name: create versioned tag + release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f "${{ inputs.version }}"
          git push origin "${{ inputs.version }}" --force
          gh release create "${{ inputs.version }}" \
            --title "${{ inputs.version }}" \
            --notes "Release ${{ inputs.version }}" \
            --target "${{ github.sha }}"
