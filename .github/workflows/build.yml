name: build

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tsconfig.json"
      - "package.json"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build

      - name: commit compiled dist/
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
          git add dist
          git diff --cached --quiet || git commit -m "🔧 rebuild dist from src"
          git push
